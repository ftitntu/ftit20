name: generatephotos.json

on:
  push:
    branches: [main]
    paths:
      - 'Photo/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: generatephotos.json
        run: |
          python3 - << 'PYEOF'
          import os, json

          PHOTO_DIR = "Photo"
          REPO = os.environ.get("GITHUB_REPOSITORY", "")
          RAW_BASE = "https://raw.githubusercontent.com/" + REPO + "/main/" + PHOTO_DIR
          IMG_EXT = {".jpg", ".jpeg", ".png", ".webp", ".gif"}

          result = []

          if os.path.isdir(PHOTO_DIR):
              for dept in sorted(os.listdir(PHOTO_DIR)):
                  dept_path = os.path.join(PHOTO_DIR, dept)
                  if not os.path.isdir(dept_path):
                      continue
                  files = []
                  for fname in sorted(os.listdir(dept_path)):
                      if os.path.splitext(fname)[1].lower() in IMG_EXT:
                          files.append(fname)
                  if files:
                      result.append({
                          "dept": dept,
                          "base": RAW_BASE + "/" + dept,
                          "files": files
                      })

          with open("photos.json", "w", encoding="utf-8") as f:
              json.dump(result, f, ensure_ascii=False, indent=2)

          total = sum(len(d["files"]) for d in result)
          print("Згенеровано: " + str(len(result)) + " кафедр, " + str(total) + " фото")
          PYEOF

      - name: Commit photos.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add photos.json
          git diff --cached --quiet || git commit -m "chore: update photos.json [skip ci]"
          git push
