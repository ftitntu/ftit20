<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Фотогалерея · ФТІТ 20 років</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;700;900&family=Geologica:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --deep:     #060e1f;
    --navy:     #0d1b3e;
    --navy-mid: #162650;
    --blue:     #1e40af;
    --electric: #29aaff;
    --sky:      #7dd4fc;
    --yellow:   #f5c518;
    --white:    #ffffff;
    --muted:    #94a3b8;
    --border:   rgba(41,170,255,0.15);
    --border2:  rgba(41,170,255,0.28);
    --bg:       #060e1f;
    --surface:  #0d1b3e;
    --surface2: #162650;
    --text:     #ffffff;
    --text2:    #94a3b8;
    --text3:    rgba(148,163,184,0.45);
    --accent:   #29aaff;
    --accent2:  #7dd4fc;
    --font-display: 'Unbounded', sans-serif;
    --font-body:    'Geologica', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-weight: 300;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* HERO */
  .hero {
    padding: 80px 40px 60px;
    max-width: 1440px;
    margin: 0 auto;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 40px;
  }
  .hero-eyebrow {
    font-family: var(--font-display);
    font-size: 0.65rem;
    font-weight: 400;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--electric);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .hero-eyebrow::before {
    content: "";
    width: 24px; height: 1px;
    background: var(--electric);
    display: block;
  }
  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(2.2rem, 5vw, 4rem);
    font-weight: 700;
    line-height: 1.1;
    color: var(--white);
    letter-spacing: -0.02em;
  }
  .hero-title em {
    font-style: normal;
    color: var(--electric);
  }
  .hero-subtitle {
    margin-top: 20px;
    font-size: 15px;
    color: var(--text2);
    max-width: 420px;
    line-height: 1.7;
  }
  .hero-right {
    text-align: right;
    flex-shrink: 0;
  }
  .hero-stat {
    font-family: var(--font-display);
    font-size: 4rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--sky), var(--electric));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }
  .hero-stat-label {
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* FILTER BARS */
  .filter-wrap {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(6,14,31,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }

  /* Кафедри */
  .dept-nav {
    max-width: 1440px;
    margin: 0 auto;
    padding: 0 40px;
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
  }
  .dept-nav::-webkit-scrollbar { display: none; }

  .dept-btn {
    padding: 12px 16px;
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 400;
    color: var(--text3);
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.2s, border-color 0.2s;
    letter-spacing: 0.02em;
  }
  .dept-btn:hover { color: var(--text2); }
  .dept-btn.active {
    color: var(--yellow);
    border-bottom-color: var(--yellow);
    font-weight: 500;
  }

  /* Роки */
  .year-nav-wrap {
    max-width: 1440px;
    margin: 0 auto;
    padding: 0 40px;
    display: flex;
    align-items: stretch;
  }
  .year-nav {
    flex: 1;
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .year-nav::-webkit-scrollbar { display: none; }

  .sort-btn {
    padding: 0 14px;
    background: transparent;
    border: none;
    border-left: 1px solid var(--border);
    color: var(--text3);
    cursor: pointer;
    font-size: 11px;
    font-family: var(--font-body);
    letter-spacing: 0.06em;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: color 0.2s;
    flex-shrink: 0;
  }
  .sort-btn:hover { color: var(--text2); }
  .sort-btn svg { transition: transform 0.25s ease; }

  .year-btn {
    padding: 12px 14px;
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 400;
    color: var(--text3);
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.2s, border-color 0.2s;
    letter-spacing: 0.02em;
  }
  .year-btn:hover { color: var(--text2); }
  .year-btn.active {
    color: var(--electric);
    border-bottom-color: var(--electric);
    font-weight: 500;
    font-family: var(--font-display);
  }

  /* TIMELINE */
  .timeline {
    max-width: 1440px;
    margin: 0 auto;
    padding: 0 40px 80px;
  }

  .year-block {
    padding: 52px 0 0;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .year-header {
    display: flex;
    align-items: baseline;
    gap: 20px;
    margin-bottom: 28px;
  }
  .year-number {
    font-family: var(--font-display);
    font-size: 2.0rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--sky), var(--electric));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .year-divider {
    flex: 1;
    height: 1px;
    background: var(--border);
    position: relative;
    top: -6px;
  }
  .year-event-tag {
    font-family: var(--font-display);
    font-size: 0.62rem;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--yellow);
    padding: 4px 12px;
    border: 1px solid rgba(245,197,24,0.3);
    border-radius: 2em;
    white-space: nowrap;
    background: rgba(245,197,24,0.06);
  }

  /* PHOTO GRID */
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  @media(min-width: 1280px) {
    .photo-grid { grid-template-columns: repeat(5, 1fr); }
  }
  @media(min-width: 1600px) {
    .photo-grid { grid-template-columns: repeat(6, 1fr); }
  }

  .photo-item {
    cursor: pointer;
    position: relative;
  }

  .photo-inner {
    width: 100%;
    height: 180px;
    overflow: hidden;
    position: relative;
    border-radius: 8px;
  }

  .photo-inner img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    transition: transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94), filter 0.3s;
    filter: grayscale(20%) brightness(0.9);
  }
  .photo-item:hover .photo-inner img {
    transform: scale(1.05);
    filter: grayscale(0%) brightness(1);
  }

  .photo-caption {
    padding: 8px 0 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }
  .caption-title {
    font-size: 12px;
    font-weight: 400;
    color: var(--text2);
    line-height: 1.5;
  }
  .caption-dept {
    font-size: 10px;
    color: var(--yellow);
    opacity: 0.7;
    flex-shrink: 0;
    font-family: var(--font-display);
    letter-spacing: 0.05em;
  }

  @media(max-width: 900px) {
    .photo-grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media(max-width: 640px) {
    .photo-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .photo-inner { height: 150px !important; }
    .hero { padding: 80px 20px 40px; flex-direction: column; align-items: flex-start; }
    .timeline { padding: 0 20px 60px; }
    .dept-nav, .year-nav { padding: 0 20px; }
  }

  /* LIGHTBOX */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0,0,0,0.92);
    align-items: center;
    justify-content: center;
    padding: 24px;
    animation: lbFadeIn 0.2s ease;
  }
  .lightbox.open { display: flex; }
  @keyframes lbFadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .lb-inner {
    max-width: 900px;
    width: 100%;
    display: flex;
    flex-direction: column;
    height: calc(75vh + 72px);
    animation: lbSlide 0.25s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  @keyframes lbSlide {
    from { transform: translateY(16px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .lb-img-wrap {
    width: 100%;
    height: 75vh;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
  }
  .lb-img-wrap img {
    max-width: 100%;
    max-height: 75vh;
    width: auto;
    height: auto;
    object-fit: contain;
    display: block;
    border-radius: 4px;
  }
  .lb-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0 0;
    gap: 16px;
    flex-shrink: 0;
    height: 72px;
  }
  .lb-info {
    min-width: 0;
    flex: 1;
    overflow: hidden;
  }
  .lb-title {
    font-family: var(--font-display);
    font-size: 1rem;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 4px;
    letter-spacing: 0.02em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .lb-sub { font-size: 13px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lb-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    margin-left: auto;
  }
  .lb-btn {
    width: 40px; height: 40px;
    border: 1px solid var(--border);
    background: rgba(41,170,255,0.06);
    color: var(--muted);
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
  }
  .lb-btn:hover { background: rgba(41,170,255,0.15); color: var(--white); border-color: var(--border2); }
  .lb-btn:disabled { opacity: 0.25; cursor: default; }
  .lb-counter { font-size: 12px; color: var(--text3); min-width: 40px; text-align: center; }

  /* підказка свайпу на мобільних */
  @media(max-width: 640px) {
    .lb-inner { touch-action: pan-y; }
    .lb-swipe-hint {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 10px;
      opacity: 0.4;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.05em;
      animation: hintFade 4s ease 0.5s forwards;
    }
    @keyframes hintFade {
      0%   { opacity: 0.4; }
      70%  { opacity: 0.4; }
      100% { opacity: 0; }
    }

    /* Мобільний лайтбокс: перебудова layout */
    .lightbox {
      padding: 0;
      align-items: flex-start;
    }
    .lb-inner {
      width: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Кнопка закриття — вгорі справа, нижче навбару */
    #lb-close {
      position: fixed;
      top: 60px;
      right: 14px;
      z-index: 300;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 18px;
      color: var(--white);
    }

    /* Зображення — займає простір, лишаючи місце для тексту */
    .lb-img-wrap {
      flex: 1;
      max-height: 65dvh;
      width: 100%;
      border-radius: 0;
    }
    .lb-img-wrap img {
      max-height: 65dvh;
      border-radius: 0;
    }

    /* Назва фото — одразу під фото, на всю ширину */
    .lb-bar {
      flex-direction: column;
      align-items: stretch;
      padding: 12px 16px 0;
      gap: 4px;
      flex-shrink: 0;
    }
    .lb-info {
      width: 100%;
    }
    .lb-title {
      font-size: 0.82rem;
      font-weight: 500;
      width: 100%;
      white-space: normal;
    }
    .lb-sub {
      font-size: 12px;
    }

    /* Навігаційні кнопки — внизу екрану, фіксовані */
    .lb-controls {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 20px 28px;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 250;
    }
    .lb-btn:not(#lb-close) {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      font-size: 20px;
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.2);
      color: var(--white);
      backdrop-filter: blur(8px);
    }
    .lb-counter {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      min-width: 60px;
    }
  }
  @media(min-width: 641px) {
    .lb-swipe-hint { display: none; }
  }

  /* FOOTER */
  .footer {
    border-top: 1px solid var(--border);
    padding: 32px 40px;
    max-width: 1440px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer-text { font-size: 12px; color: var(--text3); letter-spacing: 0.05em; }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div id="prog" style="position:fixed;top:0;left:0;height:2px;width:0%;background:linear-gradient(90deg,var(--blue),var(--electric),var(--yellow));z-index:10000;transition:width .1s linear;"></div>

<nav style="position:fixed;top:0;left:0;right:0;z-index:900;display:flex;align-items:center;padding:1rem 2.5rem;background:rgba(6,14,31,0.0);backdrop-filter:blur(0px);transition:background .3s,backdrop-filter .3s;" id="gal-nav">
  <a href="index.html" style="font-family:var(--font-display);font-size:.65rem;font-weight:400;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:.6rem;transition:color .2s;" onmouseover="this.style.color='var(--white)'" onmouseout="this.style.color='var(--muted)'">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Повернутись
  </a>
  <span style="margin-left:auto;font-family:var(--font-display);font-size:.65rem;letter-spacing:.15em;color:var(--electric);">ФТІТ · Фотогалерея</span>
</nav>

<div class="hero" style="padding-top:110px;">
  <div class="hero-left">
    <div class="hero-eyebrow">Фотогалерея</div>
    <h1 class="hero-title">Двадцять<br>років <em>разом</em></h1>
    <p class="hero-subtitle">Архів моментів, подій і людей, які створили факультет таким, яким він є сьогодні.</p>
  </div>
  <div class="hero-right">
    <div class="hero-stat" id="total-count">—</div>
    <div class="hero-stat-label">фотографій</div>
  </div>
</div>

<div class="filter-wrap">
  <!-- Рядок кафедр -->
  <div class="dept-nav" id="dept-nav"></div>
  <!-- Рядок років -->
  <div class="year-nav-wrap">
    <div class="year-nav" id="year-nav"></div>
    <button class="sort-btn" id="sort-btn" title="Сортування по роках">
      <svg id="sort-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="5" x2="12" y2="19"/><polyline points="5 12 12 5 19 12"/>
      </svg>
      <span id="sort-label">старіші</span>
    </button>
  </div>
</div>

<div class="timeline" id="timeline"></div>

<div class="footer">
  <span class="footer-text">ФТІТ · НТУ · 2006–2026</span>
  <span class="footer-text" id="footer-count"></span>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <div class="lb-inner">
    <div class="lb-img-wrap">
      <img id="lb-img" src="" alt="">
    </div>
    <div class="lb-bar">
      <div class="lb-info">
        <div class="lb-title" id="lb-title"></div>
        <div class="lb-sub" id="lb-sub"></div>
      </div>
      <div class="lb-controls">
        <button class="lb-btn" id="lb-prev">←</button>
        <span class="lb-counter" id="lb-counter"></span>
        <button class="lb-btn" id="lb-next">→</button>
      </div>
      <button class="lb-btn" id="lb-close">✕</button>
    </div>
    <div class="lb-swipe-hint">← свайп →</div>
  </div>
</div>

<script>
// ══ КОНФІГ GITHUB ══
const REPO     = 'ftitntu/ftit20';
const BRANCH   = 'main';
const FOLDER   = 'Photo';
const RAW_BASE = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/${FOLDER}`;

function apiUrl(path) {
  return `https://api.github.com/repos/${REPO}/contents/${path}?ref=${BRANCH}`;
}

// ── маппінг назв кафедр → хештеги ──
const DEPT_TAG = {
  'Кафедра ІСТ':       'ІСТ',
  'Кафедра ТТ':        'ТТ',
  'Кафедра ІАД та ІБ': 'ІАДІБ',
  'Кафедра ТС та БДР': 'ТСБДР',
  'Кафедра ВМ':        'ВМ',
  'Кафедра МП та МК':  'МПМК',
};

function deptTag(dept) {
  return '#' + (DEPT_TAG[dept] || dept.replace(/\s+/g, ''));
}

// ── стан ──
let ALL_DATA     = []; // [{ dept, year, photos:[{title,url,dept}] }]
let allPhotos    = [];
let currentPhotos= [];
let activeDept   = 'all';
let activeYear   = 'all';
let sortAsc      = true; // true = старіші спочатку, false = новіші спочатку
let lbIndex      = 0;

// ── прогрес + nav ──
const prog = document.getElementById('prog');
const galNav = document.getElementById('gal-nav');
window.addEventListener('scroll', () => {
  const h = document.documentElement;
  prog.style.width = (h.scrollTop / (h.scrollHeight - h.clientHeight) * 100) + '%';
  const s = window.scrollY > 60;
  galNav.style.background     = s ? 'rgba(6,14,31,0.92)' : 'rgba(6,14,31,0.0)';
  galNav.style.backdropFilter = s ? 'blur(16px)'         : 'blur(0px)';
  galNav.style.borderBottom   = s ? '1px solid rgba(41,170,255,0.15)' : 'none';
});

// ── завантаження з photos.json (генерується GitHub Actions) ──
async function load() {
  showLoading();
  try {
    const JSON_URL = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/photos.json`;
    const res = await fetch(JSON_URL);
    if (!res.ok) throw new Error(`Не вдалося завантажити photos.json (${res.status}). Запусти workflow у GitHub Actions.`);
    const deptData = await res.json();

    // deptData: [{ dept, base, files: [fileName, ...] }]
    // Перетворюємо у формат який очікує processPhotos
    const adapted = deptData.map(({ dept, base, files }) => ({
      dept,
      base,
      files: files.map(name => ({ name }))
    }));

    processPhotos(adapted);

  } catch (e) {
    showError(e.message);
  }
}

function processPhotos(deptData) {
  // Збираємо всі фото з усіх кафедр, групуємо по (dept, year)
  ALL_DATA = [];
  allPhotos = [];

  deptData.forEach(({ dept, files, base }) => {
    files.forEach(f => {
      const match = f.name.match(/^(\d{4})[_\s-]/);
      const year  = match ? parseInt(match[1]) : 0;
      const title = f.name
        .replace(/^\d{4}[_\s-]/, '')
        .replace(/\.[^.]+$/, '')
        .trim();
      const url = `${base}/${encodeURIComponent(f.name)}`;
      allPhotos.push({ title, url, year, dept });
    });
  });

  if (!allPhotos.length) { showEmpty(); return; }

  document.getElementById('total-count').textContent = allPhotos.length;
  document.getElementById('footer-count').textContent =
    allPhotos.length + ' фотографій · ' + deptData.filter(d => d.files.length).length + ' кафедр';

  render();
}

// ── фільтрація ──
function getFiltered() {
  return allPhotos.filter(ph =>
    (activeDept === 'all' || ph.dept === activeDept) &&
    (activeYear === 'all' || ph.year === activeYear)
  );
}

function getYearsFor(dept) {
  const src = dept === 'all' ? allPhotos : allPhotos.filter(p => p.dept === dept);
  const years = [...new Set(src.map(p => p.year))].sort((a,b) => a - b);
  return years;
}

function getDepts() {
  return [...new Set(allPhotos.map(p => p.dept))].filter(d => d !== 'Інше').sort();
}

// ── побудова навігацій ──
function buildDeptNav() {
  const nav = document.getElementById('dept-nav');
  nav.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'dept-btn' + (activeDept === 'all' ? ' active' : '');
  allBtn.textContent = 'Всі кафедри';
  allBtn.onclick = () => { activeDept = 'all'; activeYear = 'all'; render(); };
  nav.appendChild(allBtn);

  getDepts().forEach(dept => {
    const btn = document.createElement('button');
    btn.className = 'dept-btn' + (activeDept === dept ? ' active' : '');
    btn.textContent = dept;
    btn.onclick = () => { activeDept = dept; activeYear = 'all'; render(); };
    nav.appendChild(btn);
  });
}

function buildYearNav() {
  const nav = document.getElementById('year-nav');
  nav.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'year-btn' + (activeYear === 'all' ? ' active' : '');
  allBtn.textContent = 'Всі роки';
  allBtn.onclick = () => { activeYear = 'all'; render(); };
  nav.appendChild(allBtn);

  getYearsFor(activeDept).forEach(yr => {
    const btn = document.createElement('button');
    btn.className = 'year-btn' + (activeYear === yr ? ' active' : '');
    btn.textContent = yr || 'Рік невідомий';
    btn.onclick = () => { activeYear = yr; render(); };
    nav.appendChild(btn);
  });
}

// ── рендер галереї ──
function render() {
  buildDeptNav();
  buildYearNav();

  const filtered = getFiltered();
  currentPhotos = [];

  const timeline = document.getElementById('timeline');
  timeline.innerHTML = '';

  if (!filtered.length) {
    timeline.innerHTML = `
      <div style="text-align:center;padding:5rem 2rem;">
        <div style="font-size:2.5rem;margin-bottom:1rem;">🔍</div>
        <div style="font-family:'Unbounded',sans-serif;font-size:.85rem;color:#fff;">Фото не знайдено</div>
      </div>`;
    return;
  }

  // Групуємо по роках
  const byYear = {};
  filtered.forEach(ph => {
    if (!byYear[ph.year]) byYear[ph.year] = [];
    byYear[ph.year].push(ph);
  });

  const years = Object.keys(byYear).map(Number).sort((a,b) => sortAsc ? a - b : b - a);

  years.forEach((yr, yi) => {
    const photos = byYear[yr];
    const block = document.createElement('div');
    block.className = 'year-block';
    block.style.animationDelay = (yi * 0.05) + 's';

    block.innerHTML = `
      <div class="year-header">
        <div class="year-number">${yr || 'Рік невідомий'}</div>
        <div class="year-divider"></div>
        <div class="year-event-tag">${photos.length} фото</div>
      </div>
    `;

    const grid = document.createElement('div');
    grid.className = 'photo-grid';

    photos.forEach(ph => {
      const globalIdx = currentPhotos.length;
      currentPhotos.push(ph);

      const showDept = activeDept === 'all';

      const item = document.createElement('div');
      item.className = 'photo-item';
      item.innerHTML = `
        <div class="photo-inner">
          <img src="${ph.url}" alt="${ph.title}" loading="lazy">
        </div>
        <div class="photo-caption">
          <span class="caption-title">${ph.title || '—'}</span>
          ${ph.dept !== 'Інше' ? `<span class="caption-dept">${deptTag(ph.dept)}</span>` : ''}
        </div>
      `;
      item.onclick = () => openLb(globalIdx);
      grid.appendChild(item);
    });

    block.appendChild(grid);
    timeline.appendChild(block);
  });
}

// ── допоміжні ──
function showLoading() {
  document.getElementById('timeline').innerHTML = `
    <div style="text-align:center;padding:5rem 2rem;display:flex;flex-direction:column;align-items:center;gap:1rem;">
      <div style="width:36px;height:36px;border-radius:50%;border:2px solid rgba(41,170,255,.15);border-top-color:#29aaff;animation:spin .8s linear infinite;"></div>
      <div style="font-family:'Unbounded',sans-serif;font-size:.85rem;color:#fff;">Завантаження фото...</div>
      <div style="font-size:.78rem;color:#94a3b8;">Отримуємо фото з GitHub</div>
    </div>`;
}
function showEmpty() {
  document.getElementById('timeline').innerHTML = `
    <div style="text-align:center;padding:5rem 2rem;">
      <div style="font-size:2.5rem;margin-bottom:1rem;">🖼</div>
      <div style="font-family:'Unbounded',sans-serif;font-size:.85rem;color:#fff;margin-bottom:.5rem;">Фото поки немає</div>
      <div style="font-size:.78rem;color:#94a3b8;">Додай фото у підпапки Photo/КафедраXXX/ у форматі Рік_Назва.jpg</div>
    </div>`;
}
function showError(msg) {
  document.getElementById('timeline').innerHTML = `
    <div style="text-align:center;padding:5rem 2rem;">
      <div style="font-size:2.5rem;margin-bottom:1rem;">⚠️</div>
      <div style="font-family:'Unbounded',sans-serif;font-size:.85rem;color:#fff;margin-bottom:.5rem;">Не вдалося завантажити</div>
      <div style="font-size:.78rem;color:#94a3b8;">${msg}</div>
    </div>`;
}

// ── лайтбокс ──
function openLb(idx) {
  lbIndex = idx;
  updateLb();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLb() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
function updateLb() {
  const ph = currentPhotos[lbIndex];
  const img = document.getElementById('lb-img');
  img.src = ph.url;
  img.alt = ph.title;
  document.getElementById('lb-title').textContent = ph.title || '—';
  document.getElementById('lb-sub').textContent = deptTag(ph.dept) + (ph.year ? ' · ' + ph.year : '');
  document.getElementById('lb-counter').textContent = (lbIndex + 1) + ' / ' + currentPhotos.length;
  document.getElementById('lb-prev').disabled = lbIndex === 0;
  document.getElementById('lb-next').disabled = lbIndex === currentPhotos.length - 1;
}

document.getElementById('lb-close').onclick = closeLb;
document.getElementById('lb-prev').onclick  = () => { if (lbIndex > 0) { lbIndex--; updateLb(); } };
document.getElementById('lb-next').onclick  = () => { if (lbIndex < currentPhotos.length - 1) { lbIndex++; updateLb(); } };
document.getElementById('lightbox').onclick = e => { if (e.target === document.getElementById('lightbox')) closeLb(); };
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape')      closeLb();
  if (e.key === 'ArrowLeft'  && lbIndex > 0)                        { lbIndex--; updateLb(); }
  if (e.key === 'ArrowRight' && lbIndex < currentPhotos.length - 1) { lbIndex++; updateLb(); }
});

// ── свайп на смартфоні ──
(function() {
  const lb = document.getElementById('lightbox');
  let touchStartX = 0;
  let touchStartY = 0;
  let isDragging  = false;

  lb.addEventListener('touchstart', e => {
    touchStartX = e.changedTouches[0].clientX;
    touchStartY = e.changedTouches[0].clientY;
    isDragging  = false;
  }, { passive: true });

  lb.addEventListener('touchmove', e => {
    const dx = Math.abs(e.changedTouches[0].clientX - touchStartX);
    const dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
    if (dx > dy && dx > 8) isDragging = true;
  }, { passive: true });

  lb.addEventListener('touchend', e => {
    if (!isDragging) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (dx < -50 && lbIndex < currentPhotos.length - 1) { lbIndex++; updateLb(); }
    if (dx >  50 && lbIndex > 0)                        { lbIndex--; updateLb(); }
    isDragging = false;
  }, { passive: true });
})();

// ── сортування по роках ──
document.getElementById('sort-btn').onclick = () => {
  sortAsc = !sortAsc;
  document.getElementById('sort-label').textContent = sortAsc ? 'старіші' : 'новіші';
  const icon = document.getElementById('sort-icon');
  icon.style.transform = sortAsc ? 'rotate(0deg)' : 'rotate(180deg)';
  render();
};

load();
</script>
