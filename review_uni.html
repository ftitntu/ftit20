<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Привітання від колег та друзів · ФТІТ НТУ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;700;900&family=Geologica:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --deep:     #060e1f;
  --navy:     #0d1b3e;
  --navy-mid: #162650;
  --blue:     #1e40af;
  --electric: #29aaff;
  --sky:      #7dd4fc;
  --yellow:   #f5c518;
  --white:    #ffffff;
  --muted:    #94a3b8;
  --border:   rgba(41,170,255,0.15);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--deep);color:var(--white);
  font-family:'Geologica',sans-serif;font-weight:300;overflow-x:hidden;
}
body::after{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity:0.03;pointer-events:none;z-index:9999;
}
#prog{
  position:fixed;top:0;left:0;height:2px;width:0%;
  background:linear-gradient(90deg,var(--blue),var(--electric),var(--yellow));
  z-index:10000;transition:width .1s linear;
}

/* ══ NAV ══ */
nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  display:flex;align-items:center;justify-content:space-between;
  padding:1.2rem 3rem;background:#101E40;
  backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.06);
  transition:border-color .3s;
}
nav.scrolled{border-bottom:1px solid rgba(41,170,255,.12);}
.nav-logo{
  font-family:'Unbounded',sans-serif;font-size:.75rem;font-weight:700;
  letter-spacing:.15em;color:var(--electric);text-decoration:none;
}
.nav-back{
  display:flex;align-items:center;gap:.5rem;
  font-size:.72rem;font-weight:400;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);text-decoration:none;transition:color .2s;
}
.nav-back:hover{color:var(--white);}
.nav-back svg{width:16px;height:16px;}

/* ══ HERO ══ */
.page-hero{
  min-height:42vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
  padding:8rem 2rem 5rem;position:relative;overflow:hidden;
}
.hero-grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(41,170,255,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(41,170,255,.04) 1px, transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 100%);
}
.orb{
  position:absolute;width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle, rgba(29,64,175,.2) 0%, rgba(41,170,255,.06) 45%, transparent 70%);
  pointer-events:none;
}
.page-hero-inner{position:relative;}
.page-tag{
  display:inline-flex;align-items:center;gap:.6rem;
  font-size:.7rem;font-weight:500;letter-spacing:.25em;text-transform:uppercase;
  color:var(--electric);border:1px solid rgba(41,170,255,.3);
  padding:.5em 1.4em;border-radius:2em;margin-bottom:1.8rem;
  animation:fadeUp 1s ease both;
}
.page-tag-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--electric);box-shadow:0 0 8px var(--electric);
  animation:blink 2s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.page-hero h1{
  font-family:'Unbounded',sans-serif;
  font-size:clamp(2rem,5vw,3.8rem);font-weight:700;
  line-height:1.1;letter-spacing:-.02em;margin-bottom:1rem;
  animation:fadeUp 1s ease .1s both;
}
.page-hero h1 em{color:var(--electric);font-style:normal;}
.page-hero p{
  font-size:clamp(.85rem,1.5vw,1rem);color:var(--muted);
  line-height:1.8;max-width:520px;margin:0 auto;
  animation:fadeUp 1s ease .2s both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

/* ══ CONTROLS ══ */
.controls-bar{
  padding:2rem 2rem 0;max-width:860px;margin:0 auto;
  display:flex;align-items:center;gap:1rem;
}
.search-wrap{position:relative;flex:1;}
.search-wrap svg{
  position:absolute;left:.9rem;top:50%;transform:translateY(-50%);
  width:15px;height:15px;color:var(--muted);pointer-events:none;
}
.ctrl-search{
  width:100%;background:var(--navy-mid);border:1px solid var(--border);
  border-radius:10px;padding:.65rem 1rem .65rem 2.4rem;
  color:var(--white);font-family:'Geologica',sans-serif;font-size:.85rem;
  outline:none;transition:border-color .2s;
}
.ctrl-search::placeholder{color:var(--muted);}
.ctrl-search:focus{border-color:rgba(41,170,255,.4);}
.ctrl-count{
  font-size:.7rem;color:var(--muted);letter-spacing:.05em;white-space:nowrap;
}

/* ══ CARDS ══ */
.cards-wrap{
  padding:2rem 2rem 6rem;
  max-width:860px;margin:0 auto;
  display:flex;flex-direction:column;gap:.85rem;
}

.u-card{
  background:var(--navy-mid);border:1px solid var(--border);
  border-radius:14px;padding:1.4rem 1.8rem;
  display:flex;align-items:center;gap:1.4rem;
  transition:border-color .25s,transform .25s,box-shadow .25s;
  opacity:0;transform:translateY(16px);animation:cardIn .45s ease forwards;
  text-decoration:none;
}
.u-card:hover{
  border-color:rgba(41,170,255,.3);
  transform:translateY(-2px);
  box-shadow:0 12px 40px rgba(0,0,0,.3);
}
@keyframes cardIn{to{opacity:1;transform:translateY(0);}}

.u-icon{
  width:44px;height:44px;border-radius:10px;flex-shrink:0;
  background:rgba(41,170,255,.08);border:1px solid rgba(41,170,255,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;
}
.u-from{
  flex:1;
  font-size:.88rem;font-weight:400;color:var(--white);line-height:1.5;
}
.u-link{
  display:flex;align-items:center;gap:.4rem;flex-shrink:0;
  font-family:'Unbounded',sans-serif;font-size:.6rem;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;
  color:var(--electric);
  transition:gap .2s;
}
.u-card:hover .u-link{gap:.6rem;}
.u-link svg{width:14px;height:14px;}

/* ══ STATES ══ */
.state-box{
  text-align:center;padding:5rem 2rem;
  display:flex;flex-direction:column;align-items:center;gap:1rem;
}
.state-icon{font-size:2.5rem;}
.state-title{font-family:'Unbounded',sans-serif;font-size:.9rem;font-weight:600;color:var(--white);}
.state-sub{font-size:.82rem;color:var(--muted);max-width:340px;line-height:1.6;}
.state-spinner{
  width:36px;height:36px;border-radius:50%;
  border:2px solid rgba(41,170,255,.15);border-top-color:var(--electric);
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ══ FOOTER ══ */
footer{background:var(--deep);border-top:1px solid var(--border);padding:3rem 2rem;}
.footer-inner{
  max-width:1200px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;gap:2rem;flex-wrap:wrap;
}
.footer-brand{
  font-family:'Unbounded',sans-serif;font-size:.75rem;font-weight:700;
  color:var(--electric);letter-spacing:.1em;display:flex;flex-direction:column;gap:.3rem;
}
.footer-brand span{font-family:'Geologica',sans-serif;font-size:.72rem;font-weight:300;color:var(--muted);}
.footer-links{display:flex;gap:2rem;}
.footer-links a{
  font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);text-decoration:none;transition:color .2s;
}
.footer-links a:hover{color:var(--white);}
.footer-copy{font-size:.7rem;color:rgba(148,163,184,.5);letter-spacing:.05em;}

@media(max-width:640px){
  nav{padding:1rem 1.5rem;}
  .u-link span{display:none;}
  .footer-inner{flex-direction:column;text-align:center;}
  .footer-links{flex-wrap:wrap;justify-content:center;}
}
</style>
</head>
<body>

<div id="prog"></div>

<nav id="nav">
  <a href="index.html" class="nav-logo">ФТІТ · НТУ</a>
  <a href="index.html#greetings" class="nav-back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Назад
  </a>
</nav>

<section class="page-hero">
  <div class="hero-grid"></div>
  <div class="orb"></div>
  <div class="page-hero-inner">
    <div class="page-tag"><span class="page-tag-dot"></span>Вітання · ФТІТ 20 років</div>
    <h1>Колеги та <em>друзі</em></h1>
    <p>Офіційні привітання від партнерів</p>
  </div>
</section>

<div class="controls-bar">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="ctrl-search" type="text" id="searchInput" placeholder="Пошук за назвою університету..." oninput="applyFilter()">
  </div>
  <div class="ctrl-count" id="countLabel"></div>
</div>

<div class="cards-wrap" id="cardsWrap">
  <div id="stateBox" class="state-box">
    <div class="state-spinner"></div>
    <div class="state-title">Завантаження...</div>
    <div class="state-sub">Отримуємо привітання з GitHub</div>
  </div>
</div>

<footer>
  <div class="footer-inner">
    <div class="footer-brand">
      ФТІТ · НТУ
      <span>Факультет транспортних та інформаційних технологій</span>
    </div>
    <div class="footer-links">
      <a href="index.html#about">Про факультет</a>
      <a href="index.html#gallery">Галерея</a>
      <a href="index.html#docs">Матеріали</a>
      <a href="review_stud.html">Випускники</a>
    </div>
    <div class="footer-copy">© 2026 · 20 років ФТІТ</div>
  </div>
</footer>

<script>
window.addEventListener('scroll', () => {
  const h = document.documentElement;
  document.getElementById('prog').style.width =
    (h.scrollTop / (h.scrollHeight - h.clientHeight) * 100) + '%';
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 40);
});

// ══ КОНФІГ GITHUB ══
const REPO     = 'ftitntu/ftit20';
const BRANCH   = 'main';
const RAW_FILE = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/Reviews/Universities/universities.json`;

let ALL = [];

async function load() {
  try {
    const res = await fetch(RAW_FILE);
    if (!res.ok) throw new Error(`Не вдалося завантажити файл (${res.status})`);

    const data = await res.json();
    ALL = (Array.isArray(data) ? data : []).filter(g => g.from && g.url);

    if (!ALL.length) {
      return showState('🏛', 'Привітань поки немає',
        'Додай записи у файл Reviews/Universities/universities.json на GitHub');
    }

    applyFilter();

  } catch (e) {
    showState('⚠️', 'Не вдалося завантажити', e.message);
  }
}

function applyFilter() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const list = ALL.filter(g => !q || g.from.toLowerCase().includes(q));
  render(list);
}

function render(list) {
  const wrap = document.getElementById('cardsWrap');
  const state = document.getElementById('stateBox');

  if (!list.length) {
    wrap.innerHTML = '';
    wrap.appendChild(mkState('🔍', 'Нічого не знайдено', 'Спробуй змінити пошуковий запит'));
    return;
  }

  // прибираємо спінер, рендеримо картки
  wrap.innerHTML = list.map((g, i) => `
    <a class="u-card" href="${g.url}" target="_blank" rel="noopener" style="animation-delay:${i * 50}ms">
      <div class="u-from">${g.from}</div>
      <div class="u-link">
        <span>Переглянути лист</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </a>
  `).join('');

  document.getElementById('countLabel').textContent = `${list.length} привітань`;
}

function showState(icon, title, sub) {
  const wrap = document.getElementById('cardsWrap');
  wrap.innerHTML = '';
  wrap.appendChild(mkState(icon, title, sub));
}

function mkState(icon, title, sub) {
  const d = document.createElement('div');
  d.className = 'state-box';
  d.innerHTML = `
    <div class="state-icon">${icon}</div>
    <div class="state-title">${title}</div>
    <div class="state-sub">${sub}</div>
  `;
  return d;
}

load();
</script>
</body>
</html>
